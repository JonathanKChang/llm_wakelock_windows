# Ports monitored with instant detection (any established connection counts).
local_monitored_ports = [8080, 11434]   # llama.cpp, Ollama

# Ports monitored on the remote side.
remote_monitored_ports = [8080, 11434]

# SSH local and remote ports — set to [22] to enable SSH keep-alive wakelock.
local_ssh_ports = []
remote_ssh_ports = []

# Minimum SSH session duration (seconds) before it counts as active.
ssh_min_duration = 30.0

# How often to poll the TCP table (seconds).
polling_interval = 5.0

# Enable monitoring of WSL2 TCP connections via /proc/net/tcp.
# When enabled, the same port/SSH config applies to both Windows and WSL2 connections.
# enable_wsl_monitoring = false
